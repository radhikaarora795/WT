<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Times New Roman', Times, serif;
        }
        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container{
            padding: 30px;
            border: 2px solid rgb(223, 6, 6);
            border-radius: 12px;    
            box-shadow: 0 0 15px rgba(116, 2, 2, 0.5);   /* box-shadow: horizontal-offset vertical-offset blur-radius spread-radius color; */
            width: 320px;
            text-align: center;
        }
        h1{
            color: rgba(203, 7, 7, 0.834);
        }
        input{
            width: 100%;
            padding: 12px;
            border: 2px solid rgb(104, 5, 5);
            border-radius: 5px;
            margin: 10px;
            outline: none;
        }
        button{
            width: 50%;
            padding: 12px;
            border: 2px solid rgb(104, 5, 5);
            border-radius: 10px;
            cursor: pointer;
        }
        button:hover{
            background-color: rgba(250, 119, 136, 0.906);
        }
        #result{
            margin: 15px;
            font-size: 20px;
            font-weight: bold;
            color: rgb(101, 2, 2);
        }

    </style>
    <body>
        <div class="container">
            <h1>Check Number</h1>
            <input type="number" id="num" placeholder="Enter a Number: ">
            <button onclick="checkNumber()">Check</button>
            <div id="result"></div>
        </div>
    </body>
    <script>
        function checkNumber(){
            let n=document.getElementById("num").value;
            let result=document.getElementById("result");

            if(n===""){
                result.innerHTML="Enter a Number";
                return
            }
            n=parseInt(n)
            if(n%2 == 0){
                result.innerHTML=n+" is Even";
            }
            else{
                result.innerHTML=n+" is Odd";
            }
        }
    </script>
</html>
